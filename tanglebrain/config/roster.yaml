# TangleBrain roster (plan §5) — the editable list of routable models.
#
# Add / remove / reorganize entries here; that is the modifiability requirement, first-class.
# A future model (another OAuth CLI, an OpenRouter model, a paid API) is a new entry — never
# a code change. Flag `can_orchestrate: true` to put an entry in the §6 orchestrator rotation.
#
# invoke.kind ∈ {openai-compat, cli, api}.  key_ref ∈ {file:PATH, env:NAME, none} — a
# credential *reference*, never a raw secret (see the contract's key-ref convention).
#
# For `cli` entries: a literal `{prompt}` token in `cmd` is replaced with the prompt; with no
# token the prompt is appended as the final argument. `parse` names the output parser
# (claude-json | gemini-json | plain). `scrub_env` strips env vars from the subprocess (§7).
#
# Status: the `openai-compat` local entry and all three `cli` subs are invocable. The paid-API
# tier (kind: api) is gated behind `api_billing_enabled` (config/settings.yaml, default false) AND
# each entry's own `enabled` flag — a `tier: api` entry parses but stays inert until both are on
# (issue #2). A commented example is at the bottom of this file.

- id: gpt-oss-120b
  tier: local
  invoke:
    kind: openai-compat
    base_url: "http://litellm.example:4000/v1"
    model: "gpt-oss-120b"
    # Scoped LiteLLM key (allowlist gpt-oss-120b; minted for the C0 spike, 0600 on this Mac).
    # §5's example omitted auth, but the real endpoint requires a Bearer token — attached via
    # the contract's key_ref mechanism so it is referenced, never embedded or committed.
    key_ref: "file:~/.config/tanglebrain/tanglebrain-spike.key"
  cost: free
  good_at: [grunt, code, tools]

- id: claude
  tier: sub
  invoke:
    kind: cli
    # --output-format json => one JSON object {"result": ..., "is_error": ...}; prompt appended.
    cmd: ["claude", "-p", "--output-format", "json"]
    parse: claude-json
    scrub_env: ["ANTHROPIC_API_KEY"]   # ride the Max sub (flat), not the per-token API key (§7)
    # C3b: per-invocation delegate injection (proven live). {delegate_mcp_json} is substituted
    # with the gpt-oss MCP server config; the tool is mcp__tanglebrain-delegate__delegate_local.
    delegate_args: ["--mcp-config", "{delegate_mcp_json}", "--allowedTools", "mcp__tanglebrain-delegate__delegate_local", "--strict-mcp-config"]
  cost: flat-rate                       # rate-limit bound
  good_at: [reasoning, decomposition, review]
  can_orchestrate: true                 # joins the frontier-first rotation (§6)

- id: codex
  tier: sub
  invoke:
    kind: cli
    # codex exec prints the answer to stdout (metadata to stderr); prompt appended.
    cmd: ["codex", "exec"]
    parse: plain
    # C3b: register the delegate via -c TOML overrides (codex has no per-invocation --mcp-config),
    # plus the approval/sandbox bypass codex exec needs to auto-run a tool call headless (verified:
    # without it codex cancels the MCP call; the orchestrator runs autonomously anyway).
    delegate_args: ["-c", "mcp_servers.tanglebrain_delegate.command={delegate_mcp_command}", "-c", "mcp_servers.tanglebrain_delegate.args=[\"-m\",\"tanglebrain.mcp_server\"]", "--dangerously-bypass-approvals-and-sandbox"]
  cost: flat-rate
  good_at: [code, agentic-code]
  can_orchestrate: true

- id: gemini
  tier: sub
  invoke:
    kind: cli
    # -p requires the prompt as its value, so {prompt} marks the injection point.
    cmd: ["gemini", "-p", "{prompt}", "--output-format", "json"]
    parse: gemini-json
    # C3b: gemini has no per-invocation MCP-server config — it needs a one-time
    #   gemini mcp add tanglebrain-delegate -- <python> -m tanglebrain.mcp_server
    # (see README); these per-invocation flags then allow + auto-approve the tool.
    delegate_args: ["--allowed-mcp-server-names", "tanglebrain-delegate", "--approval-mode", "yolo"]
  cost: flat-rate
  good_at: [long-context, structured-json]
  can_orchestrate: true

# --- Paid-API tier example (issue #2) — COMMENTED OUT so it stays inert. ---
# Paid API is the genuine last resort (§6). To enable: set api_billing_enabled: true in
# config/settings.yaml, mint a BUDGET-SCOPED LiteLLM virtual key on local, point key_ref at it,
# and uncomment. The raw provider key lives in LiteLLM, never here — TangleBrain only references
# the virtual key. budget_usd_month is recorded for visibility; the hard cap is LiteLLM-side.
#
# - id: gpt-5
#   tier: api
#   invoke:
#     kind: api
#     base_url: "http://litellm.example:4000/v1"   # LiteLLM endpoint (OpenAI-compat)
#     model: "gpt-5"                                          # the LiteLLM model alias
#     key_ref: "file:~/.config/tanglebrain/tanglebrain-gpt5.key"   # a scoped LiteLLM VIRTUAL key
#   cost: paid                  # real $ — last resort only (§6)
#   good_at: [reasoning, hard]
#   enabled: true               # per-key kill-switch (false => never routable, even if billing on)
#   budget_usd_month: 25        # display-only in v1; LiteLLM enforces the hard cap on the key
